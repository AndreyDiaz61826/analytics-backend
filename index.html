<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аналитический Центр</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

body{
    margin:0;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e 0%, #0f0f1a 40%, #070710 100%);
    color:#fff;
    overflow-x:hidden;
}

/* мягкое фоновое свечение */
body::before{
    content:"";
    position:fixed;
    top:-200px;
    left:-200px;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#2a6cff55,transparent 70%);
    filter:blur(120px);
    z-index:-1;
}

header{
    text-align:center;
    padding:30px;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
}

.container{
    max-width:800px;
    margin:0 auto 50px auto;
    padding:0 20px;
}

/* стеклянная карточка */
.tab-card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:20px;
    border-radius:18px;
    margin:15px 0;
    cursor:pointer;
    transition:all 0.3s ease;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    position:relative;
    overflow:hidden;
}

/* подсветка при наведении */
.tab-card::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
    transition:0.6s;
}

.tab-card:hover::after{
    left:100%;
}

.tab-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 40px rgba(42,108,255,0.4);
    border-color:#2a6cff;
}

.project-card{
    display:flex;
    align-items:center;
    gap:18px;
}

.project-icon{
    width:65px;
    height:65px;
    border-radius:16px;
    object-fit:cover;
    box-shadow:0 8px 20px rgba(0,0,0,0.6);
}

.section-title{
    font-size:20px;
    margin:30px 0 15px 0;
    font-weight:600;
    background:linear-gradient(90deg,#4da6ff,#8f6cff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.info-box{
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(10px);
    padding:22px;
    border-radius:18px;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

.label{
    color:#9aa0ff;
    font-weight:600;
}

.back-btn{
    background:linear-gradient(90deg,#2a6cff,#5f8cff);
    border:none;
    padding:8px 18px;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-weight:600;
    margin-bottom:20px;
    transition:0.3s;
}

.back-btn:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(42,108,255,0.5);
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<header>Аналитический Центр</header>

<div class="container" id="main-screen">
<div class="tab-card project-card" onclick="openProject('arizona')">
<img src="ffcdca2633fa997c18c3d443d6b181fcecc5fb3d.png" class="project-icon">
<h3>Arizona Online</h3>
</div>

<div class="tab-card project-card" onclick="openProject('rodina')">
<img src="IMG_20260301_192101_953.jpg" class="project-icon">
<h3>Rodina Online</h3>
</div>

<div class="tab-card project-card" onclick="openProject('amazing')">
<img src="IMG-20260301-WA0001.jpg" class="project-icon">
<h3>Amazing Online</h3>
</div>
</div>

<div class="container hidden" id="project-screen">
<button class="back-btn" onclick="goHome()">Назад</button>
<div id="project-info"></div>
<div class="section-title">Сервера</div>
<div id="server-list"></div>
</div>

<div class="container hidden" id="server-screen">
<button class="back-btn" onclick="goBackToProject()">Назад</button>
<div id="server-info"></div>
<div class="section-title">Государственные организации</div>
<div id="org-list"></div>
<div class="section-title">Преступные организации</div>
<div id="crime-list"></div>
</div>

<div class="container hidden" id="org-screen">
<button class="back-btn" onclick="goBackToServer()">Назад</button>
<div id="org-info"></div>
</div>

<script>
/* JS оставляем тот же самый что у тебя был */
</script>

</body>
</html>
