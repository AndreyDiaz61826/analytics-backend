<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый Аналитический Центр 💎DARKS🍀</title>
  <style>
    body {
      background: #0f0f14;
      font-family: Arial, sans-serif;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .server-card {
      background: #17171f;
      padding: 20px;
      border-radius: 16px;
      margin: 20px auto;
      max-width: 500px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .server-card:hover {
      transform: scale(1.03);
    }

    .server-icon {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 14px;
    }

    .server-card h3 {
      margin: 0 0 5px 0;
    }

    .server-card p {
      margin: 2px 0;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      font-size: 16px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    footer a {
      color: #ff6bf0;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>Новый Аналитический Центр 💎DARKS🍀</header>

  <!-- Arizona Online -->
  <div class="server-card">
    <img src="ffcdca2633fa997c18c3d443d6b181fcecc5fb3d.png" class="server-icon" alt="Arizona Online">
    <div>
      <h3>Arizona Online</h3>
      <p>Онлайн: <span id="arizona-online">-</span></p>
      <p>Статус: <span id="arizona-status">OFFLINE</span></p>
    </div>
  </div>

  <!-- Rodina Online -->
  <div class="server-card">
    <img src="IMG_20260301_192101_953.jpg" class="server-icon" alt="Rodina Online">
    <div>
      <h3>Rodina Online</h3>
      <p>Онлайн: <span id="rodina-online">-</span></p>
      <p>Статус: <span id="rodina-status">OFFLINE</span></p>
    </div>
  </div>

  <!-- Amazing Online -->
  <div class="server-card">
    <img src="IMG-20260301-WA0001.jpg" class="server-icon" alt="Amazing Online">
    <div>
      <h3>Amazing Online</h3>
      <p>Онлайн: <span id="amazing-online">-</span></p>
      <p>Статус: <span id="amazing-status">OFFLINE</span></p>
    </div>
  </div>

  <footer>
    Подключайся к нашему Discord серверу: <a href="https://discord.gg/yhzmfQVNx" target="_blank">✨Dark Straiwels✨</a>
  </footer>

  <script>
    const BASE_URL = 'https://analytics-backend-production.up.railway.app';

    function fetchServerData(serverId, onlineElId, statusElId) {
      fetch(`${BASE_URL}/server/${serverId}`)
        .then(res => res.json())
        .then(data => {
          document.getElementById(onlineElId).textContent = data.online;
          document.getElementById(statusElId).textContent = data.status?.toUpperCase() || 'ONLINE';
        })
        .catch(() => {
          document.getElementById(statusElId).textContent = 'OFFLINE';
        });
    }

    // ID серверов (замени на реальные, если будут другие)
    fetchServerData('9767606', 'arizona-online', 'arizona-status'); // Arizona Online
    fetchServerData('9767607', 'rodina-online', 'rodina-status');   // Rodina Online
    fetchServerData('1234567', 'amazing-online', 'amazing-status'); // Amazing Online

    // Автообновление каждые 30 секунд
    setInterval(() => {
      fetchServerData('9767606', 'arizona-online', 'arizona-status');
      fetchServerData('9767607', 'rodina-online', 'rodina-status');
      fetchServerData('1234567', 'amazing-online', 'amazing-status');
    }, 30000);
  </script>

</body>
</html>
