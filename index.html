<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аналитический Центр</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f0f14;
    color:white;
}

header{
    text-align:center;
    padding:25px;
    font-size:26px;
    font-weight:bold;
}

.container{
    max-width:700px;
    margin:20px auto;
    padding:0 15px;
}

.tab-card{
    background:#17171f;
    padding:15px;
    border-radius:14px;
    margin:10px 0;
    cursor:pointer;
    transition:0.25s;
    display:flex;
    align-items:center;
    gap:15px;
}

.tab-card:hover{
    transform:scale(1.02);
    background:#1e1e28;
}

.project-icon{
    width:60px;
    height:60px;
    border-radius:12px;
    object-fit:cover;
}

.section-title{
    font-size:20px;
    margin:15px 0 10px 0;
    color:#33ccff;
}

.info-box{
    background:#17171f;
    padding:15px;
    border-radius:14px;
    margin-bottom:15px;
}

.info-box p{
    margin:6px 0;
}

.label{
    color:#888;
    font-weight:bold;
}

.back-btn{
    background:#222;
    border:none;
    padding:6px 12px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    margin-bottom:10px;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<header>Аналитический Центр</header>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div class="container" id="main-screen">

<div class="tab-card" onclick="openProject('arizona')">
<img src="ffcdca2633fa997c18c3d443d6b181fcecc5fb3d.png" class="project-icon">
<h3>Arizona Online</h3>
</div>

<div class="tab-card" onclick="openProject('rodina')">
<img src="IMG_20260301_192101_953.jpg" class="project-icon">
<h3>Rodina Online</h3>
</div>

<div class="tab-card" onclick="openProject('amazing')">
<img src="IMG-20260301-WA0001.jpg" class="project-icon">
<h3>Amazing Online</h3>
</div>

</div>

<!-- ЭКРАН ПРОЕКТА -->
<div class="container hidden" id="project-screen">
<button class="back-btn" onclick="goHome()">← Назад</button>

<div id="project-info"></div>

<div class="section-title">Сервера</div>
<div id="server-list"></div>
</div>

<!-- ЭКРАН СЕРВЕРА -->
<div class="container hidden" id="server-screen">
<button class="back-btn" onclick="goBackToProject()">← Назад</button>

<div id="server-info"></div>

<div class="section-title">
Выберите организацию о которой хотите узнать информацию
</div>

<div id="org-list"></div>
</div>

<!-- ЭКРАН ОРГАНИЗАЦИИ -->
<div class="container hidden" id="org-screen">
<button class="back-btn" onclick="goBackToServer()">← Назад</button>
<div id="org-info"></div>
</div>

<script>

// Данные проектов
const projects = {
arizona:{
    name:"Arizona Online",
    online:"15000+",
    devs:"Основная команда Arizona RP",
    sponsors:"Официальные партнёры проекта",
    servers:["Phoenix","Tucson","Scottdale","Chandler","Brainburg","Saint-Rose","Mesa","Red-Rock","Yuma","Surprise","Prescott","Glendale","Kingman","Winslow","Payson","Gilbert","Show-Low","Casa-Grande","Page","Sun-City","Queen-Creek","Sedona","Holiday","Wednesday","Yava","Faraway","Bumble Bee","Christmas","Mirage","Love","Drake","Mobile 1","Mobile 2","Mobile 3"]
},
rodina:{
    name:"Rodina Online",
    online:"9000+",
    devs:"Команда Rodina RP",
    sponsors:"Партнёры Rodina",
    servers:["Центральный","Южный","Северный","Восточный","Западный","Москва","Санкт-Петербург"]
},
amazing:{
    name:"Amazing Online",
    online:"7000+",
    devs:"Amazing RP Team",
    sponsors:"Amazing Media",
    servers:["RED","YELLOW","GREEN","AZURE","SILVER","ROSE","BLACK","SKY","TITAN","X","FIRE","LIME"]
}
};

const orgs = [
"Правительство",
"ФБР",
"ЛСПД",
"ЛВПД",
"Армия",
"Больница",
"РКШД",
"Новости"
];

let currentProject = null;
let currentServer = null;

// Открыть проект
function openProject(id){
currentProject = id;

document.getElementById("main-screen").classList.add("hidden");
document.getElementById("project-screen").classList.remove("hidden");

const p = projects[id];

document.getElementById("project-info").innerHTML = `
<div class="info-box">
<p><span class="label">Название проекта:</span> ${p.name}</p>
<p><span class="label">Общий онлайн:</span> ${p.online}</p>
<p><span class="label">Команда разработчиков:</span> ${p.devs}</p>
<p><span class="label">Команда спонсоров:</span> ${p.sponsors}</p>
</div>
`;

const list = document.getElementById("server-list");
list.innerHTML = "";

p.servers.forEach(server=>{
    const div = document.createElement("div");
    div.className="tab-card";
    div.innerHTML=`<h3>${server}</h3>`;
    div.onclick=()=>openServer(server);
    list.appendChild(div);
});
}

// Открыть сервер
function openServer(server){
currentServer = server;

document.getElementById("project-screen").classList.add("hidden");
document.getElementById("server-screen").classList.remove("hidden");

document.getElementById("server-info").innerHTML=`
<div class="info-box">
<p><span class="label">Название проекта:</span> ${projects[currentProject].name}</p>
<p><span class="label">Название сервера:</span> ${server}</p>
<p><span class="label">Онлайн сервера:</span> -</p>
<p><span class="label">Глав. Администратор:</span> -</p>
</div>
`;

const orgList = document.getElementById("org-list");
orgList.innerHTML="";

orgs.forEach(org=>{
    const div=document.createElement("div");
    div.className="tab-card";
    div.innerHTML=`<h3>${org}</h3>`;
    div.onclick=()=>openOrg(org);
    orgList.appendChild(div);
});
}

// Открыть организацию
function openOrg(org){

document.getElementById("server-screen").classList.add("hidden");
document.getElementById("org-screen").classList.remove("hidden");

document.getElementById("org-info").innerHTML=`
<div class="info-box">
<p><span class="label">Название сервера:</span> ${currentServer}</p>
<p><span class="label">Название организации:</span> ${org}</p>
<p><span class="label">Информация о организации:</span> Информация будет добавлена позже.</p>
</div>
`;
}

// Навигация
function goHome(){
document.getElementById("project-screen").classList.add("hidden");
document.getElementById("main-screen").classList.remove("hidden");
}

function goBackToProject(){
document.getElementById("server-screen").classList.add("hidden");
document.getElementById("project-screen").classList.remove("hidden");
}

function goBackToServer(){
document.getElementById("org-screen").classList.add("hidden");
document.getElementById("server-screen").classList.remove("hidden");
}

</script>

</body>
</html>
