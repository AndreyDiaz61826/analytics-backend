<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аналитический Центр</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

body{
    margin:0;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e 0%, #0f0f1a 40%, #070710 100%);
    color:#fff;
}

header{
    text-align:center;
    padding:30px;
    font-size:28px;
    font-weight:700;
}

.container{
    max-width:800px;
    margin:0 auto 50px auto;
    padding:0 20px;
}

.tab-card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:20px;
    border-radius:18px;
    margin:15px 0;
    cursor:pointer;
    transition:all 0.3s ease;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.tab-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 40px rgba(42,108,255,0.4);
    border-color:#2a6cff;
}

.project-card{
    display:flex;
    align-items:center;
    gap:18px;
}

.project-icon{
    width:65px;
    height:65px;
    border-radius:16px;
    object-fit:cover;
}

.section-title{
    font-size:20px;
    margin:30px 0 15px 0;
    font-weight:600;
    color:#7faaff;
}

.info-box{
    background:rgba(255,255,255,0.04);
    padding:22px;
    border-radius:18px;
    margin-bottom:20px;
}

.label{
    color:#9aa0ff;
    font-weight:600;
}

.back-btn{
    background:#2a6cff;
    border:none;
    padding:8px 18px;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-weight:600;
    margin-bottom:20px;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<header>Аналитический Центр</header>

<div class="container" id="main-screen">

<div class="tab-card project-card" onclick="openProject('arizona')">
<h3>Arizona Online</h3>
</div>

<div class="tab-card project-card" onclick="openProject('rodina')">
<h3>Rodina Online</h3>
</div>

<div class="tab-card project-card" onclick="openProject('amazing')">
<h3>Amazing Online</h3>
</div>

</div>

<div class="container hidden" id="project-screen">
<button class="back-btn" onclick="goHome()">Назад</button>
<div id="project-info"></div>
<div class="section-title">Сервера</div>
<div id="server-list"></div>
</div>

<div class="container hidden" id="server-screen">
<button class="back-btn" onclick="goBackToProject()">Назад</button>
<div id="server-info"></div>
<div class="section-title">Государственные организации</div>
<div id="org-list"></div>
<div class="section-title">Преступные организации</div>
<div id="crime-list"></div>
</div>

<div class="container hidden" id="org-screen">
<button class="back-btn" onclick="goBackToServer()">Назад</button>
<div id="org-info"></div>
</div>

<script>

const projects = {

arizona:{
name:"Arizona Online",
online:"15000+",
servers:["Phoenix","Tucson"],
organizations:["Правительство","ФБР"],
crime:["Russian Mafia"]
},

rodina:{
name:"Rodina Online",
online:"9000+",
servers:["Арзамас","Эдово"],
organizations:["ФСБ","МВД","Армия"],
crime:["Русская мафия"]
},

amazing:{
name:"Amazing Online",
online:"7000+",
servers:["RED","YELLOW","GREEN"],
organizations:["УГИБДД","УМВД","УФСБ","ЕСС","ВЧ","СМИ"],
crime:["Скинхеды","Байкеры","Русская мафия"]
}

};

let currentProject=null;
let currentServer=null;

function openProject(id){
currentProject=id;

document.getElementById("main-screen").classList.add("hidden");
document.getElementById("project-screen").classList.remove("hidden");

const p=projects[id];

document.getElementById("project-info").innerHTML=`
<div class="info-box">
<p><span class="label">Название проекта:</span> ${p.name}</p>
<p><span class="label">Онлайн:</span> ${p.online}</p>
</div>
`;

let list=document.getElementById("server-list");
list.innerHTML="";
p.servers.forEach(server=>{
let div=document.createElement("div");
div.className="tab-card";
div.innerHTML=`<h3>${server}</h3>`;
div.onclick=()=>openServer(server);
list.appendChild(div);
});
}

function openServer(server){
currentServer=server;

document.getElementById("project-screen").classList.add("hidden");
document.getElementById("server-screen").classList.remove("hidden");

document.getElementById("server-info").innerHTML=`
<div class="info-box">
<p><span class="label">Проект:</span> ${projects[currentProject].name}</p>
<p><span class="label">Сервер:</span> ${server}</p>
</div>
`;

let orgList=document.getElementById("org-list");
orgList.innerHTML="";
projects[currentProject].organizations.forEach(org=>{
let div=document.createElement("div");
div.className="tab-card";
div.innerHTML=`<h3>${org}</h3>`;
div.onclick=()=>openOrg(org);
orgList.appendChild(div);
});

let crimeList=document.getElementById("crime-list");
crimeList.innerHTML="";
projects[currentProject].crime.forEach(org=>{
let div=document.createElement("div");
div.className="tab-card";
div.innerHTML=`<h3>${org}</h3>`;
div.onclick=()=>openOrg(org);
crimeList.appendChild(div);
});
}

function openOrg(org){
document.getElementById("server-screen").classList.add("hidden");
document.getElementById("org-screen").classList.remove("hidden");

document.getElementById("org-info").innerHTML=`
<div class="info-box">
<p><span class="label">Сервер:</span> ${currentServer}</p>
<p><span class="label">Организация:</span> ${org}</p>
<p><span class="label">Информация:</span> Будет добавлена позже</p>
</div>
`;
}

function goHome(){
document.getElementById("project-screen").classList.add("hidden");
document.getElementById("main-screen").classList.remove("hidden");
}

function goBackToProject(){
document.getElementById("server-screen").classList.add("hidden");
document.getElementById("project-screen").classList.remove("hidden");
}

function goBackToServer(){
document.getElementById("org-screen").classList.add("hidden");
document.getElementById("server-screen").classList.remove("hidden");
}

</script>

</body>
</html>
