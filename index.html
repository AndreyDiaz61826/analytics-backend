<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аналитический Центр 💎DARKS🍀</title>
<style>
body {margin:0; padding:0; font-family:Arial,sans-serif; background:#0f0f14; color:white;}
header {text-align:center; padding:30px 20px; font-size:28px; font-weight:bold;}
.container {max-width:600px; margin:20px auto;}
.project-card, .server-card, .org-card {background:#17171f; padding:15px; border-radius:12px; margin:10px 0; cursor:pointer; transition:0.3s;}
.project-card:hover, .server-card:hover, .org-card:hover {transform:scale(1.02);}
.project-icon {width:60px; height:60px; border-radius:10px; object-fit:cover; margin-right:15px;}
.flex {display:flex; align-items:center;}
.section-title {margin:10px 0; font-size:20px; color:#3399ff;}
.menu {display:flex; flex-wrap:wrap; gap:6px; margin:10px 0;}
.menu-item {padding:6px 12px; border-radius:8px; cursor:pointer; background:#17171f; border:1px solid #333; transition:0.3s;}
.menu-item.active {background:#333; border-color:#555;}
.card-title {font-size:18px; color:#33ccff; margin-bottom:6px;}
.card-info p {margin:4px 0; font-size:14px;}
.card-info .label {color:#999; font-weight:bold;}
.back-btn {margin:10px 0; padding:6px 12px; background:#222; border:none; border-radius:8px; cursor:pointer; color:white;}
.hidden {display:none;}
footer {text-align:center; padding:6px 0; background:#111; font-size:12px; position:fixed; bottom:0; width:100%;}
footer a {color:#3399ff; text-decoration:none; font-weight:bold;}
.org-btn {padding:6px 10px; margin-top:6px; background:#222; border-radius:8px; cursor:pointer; border:1px solid #333;}
</style>
</head>
<body>

<header>Новый Аналитический Центр 💎DARKS🍀</header>

<!-- Выбор проекта -->
<div class="container" id="main-screen">
  <div class="project-card flex" onclick="openProject('arizona')">
    <img src="ffcdca2633fa997c18c3d443d6b181fcecc5fb3d.png" class="project-icon" alt="Arizona Online">
    <h3>Arizona Online</h3>
  </div>
  <div class="project-card flex" onclick="openProject('rodina')">
    <img src="IMG_20260301_192101_953.jpg" class="project-icon" alt="Rodina Online">
    <h3>Rodina Online</h3>
  </div>
  <div class="project-card flex" onclick="openProject('amazing')">
    <img src="IMG-20260301-WA0001.jpg" class="project-icon" alt="Amazing Online">
    <h3>Amazing Online</h3>
  </div>
</div>

<!-- Экран сервера -->
<div class="container hidden" id="server-screen">
  <button class="back-btn" onclick="goBackToProjects()">← Назад к проектам</button>
  <div class="section-title" id="server-project-name"></div>
  <div class="menu" id="server-menu"></div>
  
  <!-- Карточка сервера с кнопкой "Организации: Выбрать" -->
  <div id="server-info" class="server-card"></div>
  
  <div class="menu hidden" id="org-menu"></div>
</div>

<!-- Экран организации -->
<div class="container hidden" id="org-screen">
  <button class="back-btn" onclick="goBackToServer()">← Назад к серверу</button>
  <div id="org-info"></div>
</div>

<footer>
  <a href="https://discord.gg/yhzmfQVNx" target="_blank">✨Dark Straiwels✨</a>
</footer>

<script>
// Списки серверов
const projects = {
  arizona:["Phoenix","Tucson","Scottdale","Chandler","Brainburg","Saint-Rose","Mesa","Red-Rock",
  "Yuma","Surprise","Prescott","Glendale","Kingman","Winslow","Payson","Gilbert",
  "Show-Low","Casa-Grande","Page","Sun-City","Queen-Creek","Sedona","Holiday","Wednesday",
  "Yava","Faraway","Bumble Bee","Christmas","Mirage","Love","Drake","Mobile 1","Mobile 2","Mobile 3"],
  
  rodina:["Центральный округ","Южный округ","Северный округ","Восточный округ","Западный округ",
  "Приморский округ","Федеральный округ","Москва","Санкт-Петербург"],
  
  amazing:["RED","YELLOW","GREEN","AZURE","SILVER","ROSE","BLACK","SKY","TITAN","X","FIRE","LIME"]
};

// Информация о серверах (шаблон)
const serverDetails = {
  "Phoenix": {admin:"-", deputy:"-", online:"-", desc:"Описание сервера"},
  "Tucson": {admin:"-", deputy:"-", online:"-", desc:"Описание сервера"},
  "Scottdale": {admin:"-", deputy:"-", online:"-", desc:"Описание сервера"},
  // остальные можно добавить
};

// Полный список организаций
const orgList = [
  {name:"Правительство", private:false, leader:"Губернатор", deputies:"Замы", members:"-", purch:"Есть"},
  {name:"ФБР", private:false, leader:"Директор", deputies:"Замы", members:"-", purch:"Нет"},
  {name:"ЛСПД", private:false, leader:"Начальник", deputies:"Замы", members:"-", purch:"Нет"},
  {name:"ЛВПД", private:false, leader:"Начальник", deputies:"Замы", members:"-", purch:"Нет"},
  {name:"РКШД", private:false, leader:"Начальник", deputies:"Замы", members:"-", purch:"Нет"},
  {name:"Больница Джефферсон", private:false, leader:"Главврач", deputies:"Замы", members:"-", purch:"Нет"},
  {name:"Больница ЛС", private:false, leader:"Главврач", deputies:"Замы", members:"-", purch:"Нет"},
  {name:"Больница ЛВ", private:false, leader:"Главврач", deputies:"Замы", members:"-", purch:"Нет"},
  {name:"Больница СФ", private:false, leader:"Главврач", deputies:"Замы", members:"-", purch:"Нет"}
];

// Открытие проекта
function openProject(projectId){
  document.getElementById("main-screen").classList.add("hidden");
  document.getElementById("server-screen").classList.remove("hidden");
  const projectName = projectId.charAt(0).toUpperCase() + projectId.slice(1) + " Online";
  document.getElementById("server-project-name").textContent = projectName;

  const menu = document.getElementById("server-menu");
  menu.innerHTML = "";
  projects[projectId].forEach(server=>{
    const btn = document.createElement("div");
    btn.textContent = server;
    btn.className = "menu-item";
    btn.onclick = () => loadServer(projectName, server);
    menu.appendChild(btn);
  });
  document.getElementById("org-menu").classList.add("hidden");
}

// Возврат к проектам
function goBackToProjects(){
  document.getElementById("server-screen").classList.add("hidden");
  document.getElementById("main-screen").classList.remove("hidden");
}

// Загрузка информации о сервере
function loadServer(projectName, server){
  const info = serverDetails[server] || {admin:"-", deputy:"-", online:"-", desc:"Описание сервера"};
  const serverInfoDiv = document.getElementById("server-info");
  serverInfoDiv.innerHTML = `
    <p><span class="label">Название проекта:</span> ${projectName}</p>
    <p><span class="label">Название сервера:</span> ${server}</p>
    <p><span class="label">Главный Администратор:</span> ${info.admin}</p>
    <p><span class="label">Заместитель Главного Администратора:</span> ${info.deputy}</p>
    <p><span class="label">Общий онлайн:</span> ${info.online}</p>
    <p><span class="label">Описание сервера:</span> ${info.desc}</p>
    <p><span class="label">Организации:</span> <button class="org-btn" onclick="toggleOrgMenu()">Выбрать</button></p>
  `;
  document.getElementById("org-menu").classList.add("hidden");
}

// Показать/скрыть меню организаций
function toggleOrgMenu(){
  const orgMenu = document.getElementById("org-menu");
  if(orgMenu.classList.contains("hidden")){
    orgMenu.innerHTML = "";
    orgList.forEach(org=>{
      const btn = document.createElement("div");
      btn.textContent = org.name;
      btn.className = "menu-item";
      btn.onclick = () => openOrgScreen(org);
      orgMenu.appendChild(btn);
    });
    orgMenu.classList.remove("hidden");
  } else {
    orgMenu.classList.add("hidden");
  }
}

// Открыть экран организации
function openOrgScreen(org){
  document.getElementById("server-screen").classList.add("hidden");
  document.getElementById("org-screen").classList.remove("hidden");
  document.getElementById("org-info").innerHTML = `
    <div class="org-card">
      <div class="card-title">${org.name}</div>
      <div class="card-info">
        <p><span class="label">Частная или нет:</span> ${org.private ? "Да" : "Нет"}</p>
        <p><span class="label">Лидер:</span> ${org.leader}</p>
        <p><span class="label">Заместители:</span> ${org.deputies}</p>
        <p><span class="label">Кол-во участников:</span> ${org.members}</p>
        <p><span class="label">Покупные ранги:</span> ${org.purch}</p>
      </div>
    </div>
  `;
}

// Возврат к серверу из организации
function goBackToServer(){
  document.getElementById("org-screen").classList.add("hidden");
  document.getElementById("server-screen").classList.remove("hidden");
}
</script>

</body>
</html>
