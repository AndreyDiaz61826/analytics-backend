<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аналитический Центр 💎DARKS🍀</title>
<style>
body {margin:0; padding:0; font-family:Arial,sans-serif; background:#0f0f14; color:white;}
header {text-align:center; padding:30px 20px; font-size:28px; font-weight:bold;}
.container {max-width:600px; margin:20px auto;}
.project-card, .server-card, .org-card, .job-card {background:#17171f; padding:15px; border-radius:12px; margin:10px 0; cursor:pointer; transition:0.3s;}
.project-card:hover, .server-card:hover, .org-card:hover, .job-card:hover {transform:scale(1.02);}
.project-icon {width:60px; height:60px; border-radius:10px; object-fit:cover; margin-right:15px;}
.flex {display:flex; align-items:center;}
.section-title {margin:10px 0; font-size:20px; color:#3399ff;}
.menu {display:flex; flex-wrap:wrap; gap:6px; margin:10px 0;}
.menu-item {padding:6px 12px; border-radius:8px; cursor:pointer; background:#17171f; border:1px solid #333; transition:0.3s;}
.menu-item.active {background:#333; border-color:#555;}
.card-title {font-size:18px; color:#33ccff; margin-bottom:6px;}
.card-info p {margin:4px 0; font-size:14px;}
.card-info .label {color:#999; font-weight:bold;}
.back-btn {margin:10px 0; padding:6px 12px; background:#222; border:none; border-radius:8px; cursor:pointer; color:white;}
footer {text-align:center; padding:6px 0; background:#111; font-size:12px; position:fixed; bottom:0; width:100%;}
footer a {color:#3399ff; text-decoration:none; font-weight:bold;}
.hidden {display:none;}
</style>
</head>
<body>

<header>Новый Аналитический Центр 💎DARKS🍀</header>

<div class="container" id="main-screen">
  <div class="project-card flex" onclick="openProject('arizona')">
    <img src="ffcdca2633fa997c18c3d443d6b181fcecc5fb3d.png" class="project-icon" alt="Arizona Online">
    <h3>Arizona Online</h3>
  </div>
  <div class="project-card flex" onclick="openProject('rodina')">
    <img src="IMG_20260301_192101_953.jpg" class="project-icon" alt="Rodina Online">
    <h3>Rodina Online</h3>
  </div>
  <div class="project-card flex" onclick="openProject('amazing')">
    <img src="IMG-20260301-WA0001.jpg" class="project-icon" alt="Amazing Online">
    <h3>Amazing Online</h3>
  </div>
</div>

<div class="container hidden" id="server-screen">
  <button class="back-btn" onclick="goBackToProjects()">← Назад к проектам</button>
  <div class="section-title" id="server-project-name"></div>
  <div class="menu" id="server-menu"></div>
  <div id="server-info"></div>
</div>

<div class="container hidden" id="org-screen">
  <button class="back-btn" onclick="goBackToServers()">← Назад к серверам</button>
  <div class="section-title" id="org-server-name"></div>
  <div class="menu" id="org-menu"></div>
  <div id="org-info"></div>
</div>

<footer>
  <a href="https://discord.gg/yhzmfQVNx" target="_blank">✨Dark Straiwels✨</a>
</footer>

<script>
const projects = {
  arizona:["Phoenix","Tucson","Scottdale","Chandler","Brainburg","Saint-Rose","Mesa","Red-Rock",
  "Yuma","Surprise","Prescott","Glendale","Kingman","Winslow","Payson","Gilbert",
  "Show-Low","Casa-Grande","Page","Sun-City","Queen-Creek","Sedona","Holiday","Wednesday",
  "Yava","Faraway","Bumble Bee","Christmas","Mirage","Love","Drake","Mobile 1","Mobile 2","Mobile 3"],
  
  rodina:["Центральный округ","Южный округ","Северный округ","Восточный округ","Западный округ",
  "Приморский округ","Федеральный округ","Москва","Санкт-Петербург"],
  
  amazing:["RED","YELLOW","GREEN","AZURE","SILVER","ROSE","BLACK","SKY","TITAN","X","FIRE","LIME"]
};

const organizations = {
  "Arizona Online":[
    {name:"Правительство", description:"Органы управления штатом", leader:"Губернатор", deputies:"Замы", members:"-", extra:"Законы и контроль"},
    {name:"Полиция Лос-Сантос", description:"Обеспечение правопорядка", leader:"Начальник", deputies:"Замы", members:"-", extra:"Патрули, аресты"},
    {name:"FBI", description:"Федеральное расследование", leader:"Директор", deputies:"Замы", members:"-", extra:"Спецоперации"}
  ],
  "Rodina Online":[
    {name:"Центральная полиция", description:"Поддержка порядка", leader:"Начальник", deputies:"Замы", members:"-", extra:"Патрули"},
    {name:"Больница Джефферсон", description:"Медицинская помощь", leader:"Главврач", deputies:"Замы", members:"-", extra:"Лечение игроков"}
  ],
  "Amazing Online":[
    {name:"RED Team", description:"Главная фракция", leader:"Лидер RED", deputies:"Замы", members:"-", extra:"События, задания"}
  ]
};

const jobs = {
  "Arizona Online":["Полицейский","Врач","Пожарный"],
  "Rodina Online":["Полицейский","Врач"],
  "Amazing Online":["Охранник","Сотрудник"]
};

function openProject(projectId){
  document.getElementById("main-screen").classList.add("hidden");
  document.getElementById("server-screen").classList.remove("hidden");
  document.getElementById("server-project-name").textContent = projectId.charAt(0).toUpperCase() + projectId.slice(1) + " Online";
  
  const menu = document.getElementById("server-menu");
  menu.innerHTML = "";
  projects[projectId].forEach(server=>{
    const btn = document.createElement("div");
    btn.textContent = server;
    btn.className = "menu-item";
    btn.onclick = () => openServer(projectId,server);
    menu.appendChild(btn);
  });
}

function goBackToProjects(){
  document.getElementById("server-screen").classList.add("hidden");
  document.getElementById("main-screen").classList.remove("hidden");
}

function openServer(projectId, server){
  document.getElementById("server-screen").classList.add("hidden");
  document.getElementById("org-screen").classList.remove("hidden");
  document.getElementById("org-server-name").textContent = server;

  const orgMenu = document.getElementById("org-menu");
  orgMenu.innerHTML = "";
  (organizations[projectId.charAt(0).toUpperCase() + projectId.slice(1) + " Online"] || []).forEach(org=>{
    const btn = document.createElement("div");
    btn.textContent = org.name;
    btn.className = "menu-item";
    btn.onclick = () => showOrgInfo(org);
    orgMenu.appendChild(btn);
  });
}

function goBackToServers(){
  document.getElementById("org-screen").classList.add("hidden");
  document.getElementById("server-screen").classList.remove("hidden");
}

function showOrgInfo(org){
  document.getElementById("org-info").innerHTML=`
    <div class="org-card">
      <div class="card-title">${org.name}</div>
      <div class="card-info">
        <p><span class="label">Описание:</span> ${org.description}</p>
        <p><span class="label">Лидер:</span> ${org.leader}</p>
        <p><span class="label">Заместители:</span> ${org.deputies}</p>
        <p><span class="label">Участники:</span> ${org.members}</p>
        <p><span class="label">Дополнительно:</span> ${org.extra}</p>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
